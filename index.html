<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Tracker Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19;
            --panel-bg: rgba(20, 27, 45, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent-play: #10b981;
            --accent-pause: #f59e0b;
            --accent-reset: #3b82f6;
            --color-time: #ffffff;
            --color-pos: #ec4899;
            --color-vel: #06b6d4;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            z-index: 10;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        button {
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #play-btn { background: var(--accent-play); }
        #play-btn:hover { background: #059669; transform: translateY(-2px); }
        #play-btn.paused { background: var(--accent-pause); }
        #play-btn.paused:hover { background: #d97706; }

        #reset-btn { background: var(--accent-reset); }
        #reset-btn:hover { background: #2563eb; transform: translateY(-2px); }

        .control-select {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .control-select option {
            background: var(--bg);
            color: white;
        }

        /* Main Area */
        .main-content {
            display: flex;
            flex: 1;
            position: relative;
        }

        /* Dashboard */
        .dashboard {
            width: 320px;
            background: var(--panel-bg);
            border-right: 1px solid var(--border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 5;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
        }

        .gauge {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .gauge::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
        }

        .gauge.time::before { background: var(--color-time); }
        .gauge.pos::before { background: var(--color-pos); }
        .gauge.vel::before { background: var(--color-vel); }

        .gauge-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .gauge-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 42px;
            font-weight: 700;
            line-height: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .gauge.time .gauge-value { color: var(--color-time); }
        .gauge.pos .gauge-value { color: var(--color-pos); }
        .gauge.vel .gauge-value { color: var(--color-vel); }

        .gauge-unit {
            font-size: 16px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        .instructions {
            margin-top: auto;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            line-height: 1.5;
            color: #bfdbfe;
        }

        /* Canvas Area */
        .canvas-container {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .progress-bar {
            position: absolute;
            bottom: 30px;
            left: 50px;
            right: 50px;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--color-vel), var(--color-pos));
            width: 0%;
        }

    </style>
</head>
<body>

    <header>
        <h1>Physics Lab: Velocity & Time</h1>
        <div class="controls">
            <select id="auto-pause-select" class="control-select">
                <option value="0">Auto-Pause: Off</option>
                <option value="1">Auto-Pause: 1s</option>
                <option value="2" selected>Auto-Pause: 2s</option>
                <option value="4">Auto-Pause: 4s</option>
            </select>
            <select id="scenario-select" class="control-select" style="background: var(--accent-reset);">
                <option value="1">Scenario 1</option>
                <option value="2">Scenario 2</option>
                <option value="3">Scenario 3</option>
                <option value="4">Scenario 4</option>
            </select>
            <button id="play-btn">Play</button>
        </div>
    </header>

    <div class="main-content">
        <div class="dashboard">
            <div class="gauge time">
                <div class="gauge-label">Time</div>
                <div class="gauge-value" id="val-time">0.0<span class="gauge-unit">s</span></div>
            </div>
            
            <div class="gauge pos">
                <div class="gauge-label">Position</div>
                <div class="gauge-value" id="val-pos">0.0<span class="gauge-unit">m</span></div>
            </div>

            <div class="gauge vel">
                <div class="gauge-label">Velocity</div>
                <div class="gauge-value" id="val-vel">0.0<span class="gauge-unit">m/s</span></div>
            </div>

            <div class="instructions">
                <strong>Instructions:</strong><br>
                Play the simulation and pause it periodically. Record the Time and Velocity values to create your Velocity vs. Time graph. Calculate the acceleration at different intervals!
            </div>
        </div>

        <div class="canvas-container" id="canvas-container">
            <canvas id="sim-canvas"></canvas>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('sim-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        const playBtn = document.getElementById('play-btn');
        const scenarioSelect = document.getElementById('scenario-select');
        const autoPauseSelect = document.getElementById('auto-pause-select');
        
        const valTime = document.getElementById('val-time');
        const valPos = document.getElementById('val-pos');
        const valVel = document.getElementById('val-vel');
        const progressFill = document.getElementById('progress-fill');

        const TOTAL_TIME = 20; // seconds
        const PIXELS_PER_METER = 20;
        
        let isPlaying = false;
        let currentTime = 0;
        let lastRealTime = 0;
        let animId = null;
        let nextPauseTime = 0;
        
        let phases = [];

        const SCENARIOS = {
            1: [2, 1, -1, 3, -2],
            2: [2, 1, -3, -1, -2],
            3: [3, -3, -1, -2, 1],
            4: [1, 2, -1, -2, -3]
        };

        function generatePhases() {
            let newPhases = [];
            let t = 0;
            const scenarioNum = parseInt(scenarioSelect.value, 10);
            const accels = SCENARIOS[scenarioNum] || SCENARIOS[1];
            
            for (let i = 0; i < 5; i++) {
                let duration = 4;
                let a = accels[i];
                
                newPhases.push({
                    startTime: t,
                    endTime: t + duration,
                    duration: duration,
                    a: a
                });
                
                t += duration;
            }

            // Precalculate physics states at boundaries
            let v = 0;
            let x = 0;
            for (let p of newPhases) {
                p.startV = v;
                p.startX = x;
                v += p.a * p.duration;
                x += p.startV * p.duration + 0.5 * p.a * p.duration * p.duration;
            }
            
            return newPhases;
        }

        function getState(t) {
            if (t <= 0) return { x: 0, v: 0, a: phases[0].a };
            if (t >= TOTAL_TIME) {
                const last = phases[phases.length - 1];
                const dt = last.duration;
                const v = last.startV + last.a * dt;
                const x = last.startX + last.startV * dt + 0.5 * last.a * dt * dt;
                return { x, v, a: 0 };
            }
            for (let p of phases) {
                if (t >= p.startTime && t < p.endTime) {
                    const dt = t - p.startTime;
                    const v = p.startV + p.a * dt;
                    const x = p.startX + p.startV * dt + 0.5 * p.a * dt * dt;
                    return { x, v, a: p.a };
                }
            }
            return { x: 0, v: 0, a: 0 };
        }

        function resize() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawFrame();
        }
        window.addEventListener('resize', resize);

        function resetRun() {
            phases = generatePhases();
            currentTime = 0;
            isPlaying = false;
            playBtn.textContent = 'Play';
            playBtn.classList.remove('paused');
            updateUI();
            drawFrame();
        }

        function getAutoPauseInterval() {
            return parseInt(autoPauseSelect.value, 10);
        }

        function togglePlay() {
            if (currentTime >= TOTAL_TIME) {
                currentTime = 0; // restart
            }
            isPlaying = !isPlaying;
            if (isPlaying) {
                const interval = getAutoPauseInterval();
                if (interval > 0) {
                    nextPauseTime = Math.floor((currentTime + 0.001) / interval) * interval + interval;
                } else {
                    nextPauseTime = TOTAL_TIME + 1;
                }

                playBtn.textContent = 'Pause';
                playBtn.classList.add('paused');
                lastRealTime = performance.now();
                animId = requestAnimationFrame(loop);
            } else {
                playBtn.textContent = 'Play';
                playBtn.classList.remove('paused');
                if (animId) cancelAnimationFrame(animId);
            }
        }

        playBtn.addEventListener('click', togglePlay);
        scenarioSelect.addEventListener('change', resetRun);
        autoPauseSelect.addEventListener('change', () => {
            if (isPlaying) {
                const interval = getAutoPauseInterval();
                if (interval > 0) {
                    nextPauseTime = Math.floor((currentTime + 0.001) / interval) * interval + interval;
                } else {
                    nextPauseTime = TOTAL_TIME + 1;
                }
            }
        });

        function updateUI() {
            const state = getState(currentTime);
            
            // Format numbers nicely
            valTime.innerHTML = `${currentTime.toFixed(1)}<span class="gauge-unit">s</span>`;
            valPos.innerHTML = `${state.x.toFixed(1)}<span class="gauge-unit">m</span>`;
            valVel.innerHTML = `${state.v.toFixed(1)}<span class="gauge-unit">m/s</span>`;
            
            // Update progress bar
            progressFill.style.width = `${(currentTime / TOTAL_TIME) * 100}%`;
        }

        function drawCar(ctx, screenX, screenY) {
            ctx.save();
            ctx.translate(screenX, screenY);
            
            // Body
            ctx.fillStyle = '#0ea5e9';
            ctx.shadowColor = '#0ea5e9';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.roundRect(-40, -15, 80, 30, 8);
            ctx.fill();
            
            // Windows
            ctx.fillStyle = '#0f172a';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.roundRect(-20, -20, 50, 20, 5);
            ctx.fill();

            // Wheels
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(-25, 15, 12, 0, Math.PI * 2);
            ctx.arc(25, 15, 12, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#1e293b';
            ctx.beginPath();
            ctx.arc(-25, 15, 6, 0, Math.PI * 2);
            ctx.arc(25, 15, 6, 0, Math.PI * 2);
            ctx.fill();

            // Headlight
            const state = getState(currentTime);
            if (state.v >= 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.moveTo(35, -5);
                ctx.lineTo(80, -20);
                ctx.lineTo(80, 10);
                ctx.closePath();
                ctx.fill();
            } else {
                // Reverse light
                ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
                ctx.beginPath();
                ctx.moveTo(-35, -5);
                ctx.lineTo(-60, -15);
                ctx.lineTo(-60, 5);
                ctx.closePath();
                ctx.fill();
            }

            ctx.restore();
        }

        function drawFrame() {
            const state = getState(currentTime);
            const w = canvas.width;
            const h = canvas.height;
            const cy = h / 2 + 50; // Road height

            ctx.clearRect(0, 0, w, h);

            // Sky / Background gradient
            const grd = ctx.createLinearGradient(0, 0, 0, h);
            grd.addColorStop(0, '#020617');
            grd.addColorStop(1, '#1e293b');
            ctx.fillStyle = grd;
            ctx.fillRect(0, 0, w, h);

            // Camera tracking logic: keep car roughly centered
            let cameraX = state.x * PIXELS_PER_METER;
            let screenOffsetX = w / 3; // Put car at 1/3 of screen width

            ctx.save();
            // Translate world so camera focuses on car
            ctx.translate(screenOffsetX - cameraX, 0);

            // Draw Road
            ctx.fillStyle = '#334155';
            ctx.fillRect(-10000, cy, 20000, 200);
            
            // Road markers and lines
            ctx.fillStyle = '#cbd5e1';
            ctx.font = '16px "JetBrains Mono"';
            ctx.textAlign = 'center';
            
            // Draw lines from roughly where the camera is looking
            const startMeters = Math.floor((cameraX - screenOffsetX) / PIXELS_PER_METER) - 10;
            const endMeters = startMeters + Math.ceil(w / PIXELS_PER_METER) + 20;

            for (let m = startMeters; m <= endMeters; m++) {
                let px = m * PIXELS_PER_METER;
                
                // Dashed center line
                if (m % 2 === 0) {
                    ctx.fillStyle = '#eab308';
                    ctx.fillRect(px, cy + 50, PIXELS_PER_METER * 1.5, 6);
                }

                // Distance markers every 10 meters
                if (m % 10 === 0) {
                    ctx.fillStyle = '#cbd5e1';
                    ctx.fillRect(px - 2, cy - 20, 4, 20); // post
                    ctx.fillText(m + 'm', px, cy - 30);
                }
            }
            ctx.restore();

            // Draw Car (fixed at screenOffsetX)
            drawCar(ctx, screenOffsetX, cy - 15);
        }

        function loop(timestamp) {
            if (!isPlaying) return;

            const dt = (timestamp - lastRealTime) / 1000;
            lastRealTime = timestamp;

            currentTime += dt;
            
            const interval = getAutoPauseInterval();
            if (interval > 0 && currentTime >= nextPauseTime && currentTime < TOTAL_TIME) {
                currentTime = nextPauseTime; // snap exactly to boundary
                isPlaying = false;
                playBtn.textContent = 'Play';
                playBtn.classList.remove('paused');
            }

            if (currentTime >= TOTAL_TIME) {
                currentTime = TOTAL_TIME;
                isPlaying = false;
                playBtn.textContent = 'Restart';
                playBtn.classList.remove('paused');
            }

            updateUI();
            drawFrame();

            if (isPlaying) {
                animId = requestAnimationFrame(loop);
            }
        }

        // Init
        resetRun();
        resize();

    </script>
</body>
</html>
